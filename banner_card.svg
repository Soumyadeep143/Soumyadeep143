<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#001F3F"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7928CA;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow-effect">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <g opacity="0.08" fill="#00D9FF">
    <circle cx="600" cy="40" r="1.5"/><circle cx="640" cy="40" r="1.5"/><circle cx="680" cy="40" r="1.5"/><circle cx="720" cy="40" r="1.5"/><circle cx="760" cy="40" r="1.5"/><circle cx="800" cy="40" r="1.5"/><circle cx="840" cy="40" r="1.5"/><circle cx="880" cy="40" r="1.5"/>
    <circle cx="600" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="680" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/><circle cx="760" cy="80" r="1.5"/><circle cx="800" cy="80" r="1.5"/><circle cx="840" cy="80" r="1.5"/><circle cx="880" cy="80" r="1.5"/>
    <circle cx="600" cy="120" r="1.5"/><circle cx="640" cy="120" r="1.5"/><circle cx="680" cy="120" r="1.5"/><circle cx="720" cy="120" r="1.5"/><circle cx="760" cy="120" r="1.5"/><circle cx="800" cy="120" r="1.5"/><circle cx="840" cy="120" r="1.5"/><circle cx="880" cy="120" r="1.5"/>
    <circle cx="600" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="680" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/><circle cx="760" cy="160" r="1.5"/><circle cx="800" cy="160" r="1.5"/><circle cx="840" cy="160" r="1.5"/><circle cx="880" cy="160" r="1.5"/>
  </g>

  <!-- Accent bars -->
  <rect x="0" y="0" width="4" height="200" fill="#00D9FF" opacity="0.9" rx="2"/>
  <rect x="6" y="0" width="2" height="200" fill="#7928CA" opacity="0.7"/>

  <!-- Glow circle ring around photo area -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="url(#glow)" stroke-width="3" filter="url(#glow-effect)"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#7928CA" stroke-width="1.5" opacity="0.6"/>

  <!-- Tech dots -->
  <circle cx="13" cy="100" r="4" fill="#00D9FF" opacity="0.8"/>
  <circle cx="187" cy="100" r="4" fill="#00D9FF" opacity="0.8"/>
  <circle cx="100" cy="13" r="4" fill="#00D9FF" opacity="0.8"/>
  <circle cx="100" cy="187" r="4" fill="#00D9FF" opacity="0.8"/>

  <!-- Name & title text -->
  <text x="220" y="65" font-family="JetBrains Mono, Courier New, monospace" font-size="32" font-weight="800" fill="#ffffff">Soumyadeep Sarkar</text>
  <text x="220" y="95" font-family="JetBrains Mono, Courier New, monospace" font-size="14" fill="#00D9FF">AI/ML Engineer  ·  Builder  ·  Content Creator</text>

  <!-- Separator line -->
  <line x1="220" y1="108" x2="680" y2="108" stroke="url(#glow)" stroke-width="1" opacity="0.5"/>

  <!-- Tag badges -->
  <rect x="220" y="118" width="70" height="22" rx="11" fill="#00D9FF" opacity="0.15" stroke="#00D9FF" stroke-width="0.8"/>
  <text x="255" y="133" font-family="monospace" font-size="11" fill="#00D9FF" text-anchor="middle">LLM</text>

  <rect x="298" y="118" width="70" height="22" rx="11" fill="#00D9FF" opacity="0.15" stroke="#00D9FF" stroke-width="0.8"/>
  <text x="333" y="133" font-family="monospace" font-size="11" fill="#00D9FF" text-anchor="middle">RAG</text>

  <rect x="376" y="118" width="70" height="22" rx="11" fill="#7928CA" opacity="0.2" stroke="#7928CA" stroke-width="0.8"/>
  <text x="411" y="133" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">MCP</text>

  <rect x="454" y="118" width="100" height="22" rx="11" fill="#7928CA" opacity="0.2" stroke="#7928CA" stroke-width="0.8"/>
  <text x="504" y="133" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Agentic AI</text>

  <rect x="562" y="118" width="90" height="22" rx="11" fill="#FF6B35" opacity="0.15" stroke="#FF6B35" stroke-width="0.8"/>
  <text x="607" y="133" font-family="monospace" font-size="11" fill="#FF6B35" text-anchor="middle">Node.js</text>

  <!-- Bottom line -->
  <text x="220" y="170" font-family="monospace" font-size="12" fill="#666">📍 Bengaluru, India  ·  Final Year CSE @ VTU  ·  CGPA 9.1  ·  Open to Roles 2026</text>
  <text x="220" y="188" font-family="monospace" font-size="11" fill="#555">🎥 YouTube: @undercoveragent-update  ·  AI × Scalable Software</text>

</svg>